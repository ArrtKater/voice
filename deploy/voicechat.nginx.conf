# /etc/nginx/sites-available/voicechat  →  ln -s в sites-enabled, nginx -t, systemctl reload nginx
server {
    listen 80;
    server_name voice.artkater.online;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name voice.artkater.online;

    ssl_certificate     /etc/letsencrypt/live/voice.artkater.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voice.artkater.online/privkey.pem;

    client_max_body_size 500m;

    location / {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
